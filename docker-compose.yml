version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - venv_data:/app/.venv
      - uv_cache:/root/.cache/uv
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./web/app
      dockerfile: Dockerfile
    volumes:
      - ./web/app:/app
      - node_modules_data:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  venv_data:
  uv_cache:
  node_modules_data:
