services:
  redis:
    image: redis:7-alpine
    ports:
      # Loopback only - redis has no auth, so it must not be reachable from
      # the LAN now that this machine serves other devices.
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - backend/.env
    ports:
      # Published for the Proxmox nginx gateway (which fronts the app via a
      # cloudflared tunnel): it proxies https://<domain>/api/ -> :8000.
      - "8000:8000"
    volumes:
      - ./backend:/backend
      - venv_data:/backend/.venv
      - uv_cache:/root/.cache/uv
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      # Published for the gateway: https://<domain>/ -> :8080.
      - "8080:8080"
    environment:
      # Extra Host header vite's dev server should accept, i.e. the public
      # domain the gateway serves the app under. See vite.config.ts.
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    volumes:
      - ./frontend:/frontend
      - node_modules_data:/frontend/node_modules
    depends_on:
      - backend

volumes:
  redisdata:
  venv_data:
  uv_cache:
  node_modules_data:
